<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta name="theme-color" content="#0f172a">
    <title>TV Comercial | Corrida de Vendas</title>
    <link rel="icon" type="image/png" href="imagens/IconeMyPharm.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tv-vendedores.css?v=20260326onlinecache1">
</head>
<body>
    <div class="tv-bg" aria-hidden="true">
        <!-- Grid Matrix Effect -->
        <div class="tv-bg-grid"></div>
        <!-- Lights -->
        <div class="tv-glow tv-glow-1"></div>
        <div class="tv-glow tv-glow-2"></div>
    </div>
    <div class="tv-wrap">
        <header class="tv-header">
            <div class="tv-header-left">
                <h1><i class="fas fa-flag-checkered icon-neon"></i> Corrida de Vendas</h1>
                <p id="tvPeriodo" class="tv-periodo">Período atual</p>
            </div>
            <div class="tv-positions-sky">
                <span class="tv-pos-num neon-gold" aria-hidden="true">1º</span>
                <span class="tv-pos-num neon-silver" aria-hidden="true">2º</span>
                <span class="tv-pos-num neon-bronze" aria-hidden="true">3º</span>
            </div>
            <div class="tv-actions">
                <span id="tvUpdatedAt" class="tv-updated">Atualizado: --</span>
                <button id="tvFullscreenBtn" class="tv-btn glass-btn" type="button">
                    <i class="fas fa-expand"></i> Tela cheia
                </button>
            </div>
        </header>

        <section class="podium" id="tvPodium">
            <div class="podium-item glass-panel">Carregando pódio...</div>
        </section>

        <section class="race glass-panel" id="tvRace">
            <div class="race-empty">Carregando corrida...</div>
        </section>
    </div>

    <!-- Overtake Overlay -->
    <div id="overtakeOverlay" class="overtake-overlay" aria-hidden="true">
        <h2 id="overtakeText"></h2>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="js/tv-vendedores.js?v=20260326onlinecache1"></script>
</body>
</html>
