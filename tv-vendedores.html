<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>TV Comercial | Corrida de Vendas</title>
    <link rel="icon" type="image/png" href="imagens/IconeMyPharm.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/tv-vendedores.css">
</head>
<body>
    <div class="tv-wrap">
        <header class="tv-header">
            <div>
                <h1><i class="fas fa-flag-checkered"></i> Corrida de Vendas</h1>
                <p id="tvPeriodo">Período atual</p>
            </div>
            <div class="tv-actions">
                <span id="tvUpdatedAt" class="tv-updated">Atualizado: --</span>
                <button id="tvFullscreenBtn" class="tv-btn" type="button">
                    <i class="fas fa-expand"></i> Tela cheia
                </button>
            </div>
        </header>

        <section class="podium" id="tvPodium">
            <div class="podium-item">Carregando pódio...</div>
        </section>

        <section class="race" id="tvRace">
            <div class="race-empty">Carregando corrida...</div>
        </section>
    </div>

    <script src="js/tv-vendedores.js"></script>
</body>
</html>
